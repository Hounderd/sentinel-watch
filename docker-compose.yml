version: '3.8'

services:
  daemon:
    build: ./daemon
    container_name: sentinel_daemon
    restart: unless-stopped
    volumes:
      - sentinel_data:/app/data
      - ./config.json:/app/config.json:ro
    network_mode: "host" # Needs host network to ping accurately
    depends_on:
      - ntfy

  api:
    build: ./api
    container_name: sentinel_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - sentinel_data:/app/data
      - ./config.json:/app/config.json:ro

  frontend:
    build: ./frontend
    container_name: sentinel_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  ntfy:
    image: binwiederhier/ntfy
    container_name: sentinel_ntfy
    command: serve
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ntfy_data:/var/cache/ntfy

volumes:
  ntfy_data:
  sentinel_data:
